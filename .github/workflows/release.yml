name: Release

on:
  push:
    branches:
      - main

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  # ============================================
  # Main Release Flow (triggered on push to main with RELEASE in commit message)
  # ============================================
  release-build:
    name: Release - Build & Version
    if: contains(github.event.head_commit.message, 'RELEASE')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get token
        id: get_token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          private_key: ${{ secrets.RELEASE_APP_PEM }}
          app_id: ${{ secrets.RELEASE_APP_ID }}
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ steps.get_token.outputs.token }}
          ref: ${{ github.ref }}
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
      - name: Use Latest Corepack
        run: |
          echo "Before: corepack version => $(corepack --version || echo 'not installed')"
          npm install -g corepack@latest
          echo "After : corepack version => $(corepack --version)"
          corepack enable
          pnpm --version
      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          cache: 'pnpm'
          node-version-file: package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build & Version
        run: npm run version:ci
        env:
          GITHUB_TOKEN: ${{ steps.get_token.outputs.token }}
      - name: Push versions, changelog and tags
        run: git push --atomic origin main $(git tag -l)
        env:
          GITHUB_TOKEN: ${{ steps.get_token.outputs.token }}

  release-publish:
    name: Release - Publish to npm
    needs: release-build
    if: contains(github.event.head_commit.message, 'RELEASE')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main
      - name: Use Latest Corepack
        run: |
          npm install -g corepack@latest
          corepack enable
      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          cache: 'pnpm'
          node-version-file: package.json
          registry-url: https://registry.npmjs.org/
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build
        run: pnpm run build:ci
      - name: Publish to npm
        run: pnpm -r publish --access=public --no-git-checks --provenance

  # ============================================
  # Next Release Flow (triggered after main release completes)
  # ============================================
  release-next-build:
    name: Release Next - Build & Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      next_version: ${{ steps.set_version.outputs.next_version }}
    steps:
      - name: Get token
        id: get_token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          private_key: ${{ secrets.RELEASE_APP_PEM }}
          app_id: ${{ secrets.RELEASE_APP_ID }}
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ steps.get_token.outputs.token }}
          ref: ${{ github.ref }}
      - name: Run git config
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
      - name: Use Latest Corepack
        run: |
          echo "Before: corepack version => $(corepack --version || echo 'not installed')"
          npm install -g corepack@latest
          echo "After : corepack version => $(corepack --version)"
          corepack enable
          pnpm --version
      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          cache: 'pnpm'
          node-version-file: package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          CI: true
      - name: Set Next Version
        id: set_version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          CURRENT_DATE=$(date +'%Y%m%d')
          NEXT_VERSION="0.0.0-next-${SHORT_SHA}-${CURRENT_DATE}"
          echo "NEXT_VERSION=${NEXT_VERSION}" >> $GITHUB_ENV
          echo "next_version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
      - name: Build
        run: pnpm run build:ci
      - name: Bump version
        run: pnpm print-affected:ci | xargs -I {} pnpm --filter={} exec npm version "${NEXT_VERSION}" --git-tag-version=false

  release-next-publish:
    name: Release Next - Publish to npm
    needs: release-next-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main
      - name: Use Latest Corepack
        run: |
          npm install -g corepack@latest
          corepack enable
      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          cache: 'pnpm'
          node-version-file: package.json
          registry-url: https://registry.npmjs.org/
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          CI: true
      - name: Set Next Version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          CURRENT_DATE=$(date +'%Y%m%d')
          echo "NEXT_VERSION=0.0.0-next-${SHORT_SHA}-${CURRENT_DATE}" >> $GITHUB_ENV
      - name: Build
        run: pnpm run build:ci
      - name: Bump version
        run: pnpm print-affected:ci | xargs -I {} pnpm --filter={} exec npm version "${NEXT_VERSION}" --git-tag-version=false
      - name: Publish to npm
        run: pnpm -r publish --access=public --no-git-checks --tag=next --provenance
        env:
          CI: true
